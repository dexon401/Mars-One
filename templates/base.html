<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand bg-light">
        <div class="containter">
        {% if current_user.is_authenticated %}
            <a class="navbar-brand" href="/logout">{{ current_user.name }}</a>
        {% else %}
            <ul class="navbar-nav">
                <li class="nav-item"><a class="btn btn-primary" href="/register">Зарегистрироваться</a></li>
                <li class="nav-item"><a class="btn btn-success" href="/login">Войти</a></li>
            </ul>
        {% endif %}
        </div>
    </nav>
    <div class="container">
        <h1>Миссия Колонизация Марса</h1>
        <h4 id="gray-padding">И на Марсе будут яблони цвести!</h4>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
